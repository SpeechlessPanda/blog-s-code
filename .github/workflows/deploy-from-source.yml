name: Deploy Blog From Source

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    if: github.repository != 'SpeechlessPanda/SpeechlessPanda.github.io'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        run: pnpm run build

      - name: Sync README to publish directory
        shell: bash
        run: |
          if [[ -f README.md ]]; then
            cp README.md public/README.md
            echo "[readme-sync] Synced README.md to public/README.md"
          else
            echo "::warning::[readme-sync] Missing README.md in repository root"
          fi

      - name: Deploy to GitHub Pages repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: SpeechlessPanda/SpeechlessPanda.github.io
          publish_branch: main
          publish_dir: ./public
          enable_jekyll: false
          force_orphan: false
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
