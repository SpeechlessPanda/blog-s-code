name: retry-pages-deploy

# 自动重跑失败的 GitHub Pages 部署。
# 原因:actions/deploy-pages 偶发平台错误 "Deployment failed, try again later."
# (发布仓 SpeechlessPanda.github.io 的 pages-build-deployment 已多次因此失败),
# 每次都要人工重跑。本 workflow 运行在源仓 blog-s-code(此处 workflow 正常激活),
# 每 10 分钟巡检发布仓的 pages-build-deployment:失败且尝试次数 < 3 则用
# PAGES_DEPLOY_TOKEN 跨仓重跑,超过 3 次放弃以防死循环。
#
# 为什么放在源仓而非发布仓:peaceiris/actions-gh-pages 默认 exclude_assets=.github,
# 同步到 public/.github/workflows 的文件不会推到发布仓,故必须在源仓运行、跨仓操作。

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  retry:
    runs-on: ubuntu-latest
    steps:
      - name: Rerun failed Pages deployment if needed
        env:
          GH_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          PAGES_REPO: SpeechlessPanda/SpeechlessPanda.github.io
        run: |
          set -uo pipefail
          LATEST=$(gh run list --workflow=pages-build-deployment --repo "$PAGES_REPO" --limit 1 --json databaseId,status,conclusion --jq '.[0]')
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "未找到 pages-build-deployment 运行记录,跳过。"
            exit 0
          fi
          STATUS=$(echo "$LATEST" | jq -r .status)
          CONCLUSION=$(echo "$LATEST" | jq -r .conclusion)
          RUN_ID=$(echo "$LATEST" | jq -r .databaseId)
          echo "最近一次 pages 部署($PAGES_REPO): id=$RUN_ID status=$STATUS conclusion=$CONCLUSION"
          if [ "$STATUS" != "completed" ]; then echo "仍在运行,跳过。"; exit 0; fi
          if [ "$CONCLUSION" != "failure" ]; then echo "未失败,跳过。"; exit 0; fi
          ATTEMPT=$(gh run view "$RUN_ID" --repo "$PAGES_REPO" --json runAttempt --jq '.runAttempt')
          echo "尝试次数: $ATTEMPT"
          if [ "$ATTEMPT" -ge 3 ]; then echo "已尝试 $ATTEMPT 次,放弃以防死循环(请人工排查)。"; exit 0; fi
          echo "重跑 $RUN_ID ..."
          gh run rerun "$RUN_ID" --repo "$PAGES_REPO"
