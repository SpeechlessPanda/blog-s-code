    服了，比赛报名临时说不行，有个地方有问题，要重新盖章这些的。虽然我支持周末放假，但是这个节骨眼周末找不到行政盖章也挺无力的。还有就是，明明一个月的报名窗口期，偏偏要等到后半个月甚至最后十天才把盖章流程说出来，刨开节假日后真是酣畅淋漓的与时间赛跑。也是体会到学校行政的恶心之处了，之前体感还没这么明显。

    昨天看上一届学长在群里求实习，看的我不自觉瑟瑟发抖，我要是保不上研，后面本科就业会不会也是这样呢。哎，焦虑。
    
    今天考完计组了，但晚上回来一点复习状态没有，后面是最重要的两个考试课。我还觉得自己没有找到考试的状态，不知道怎么才能好一点。没招。
