- author: SpeechlessPanda
  date: 2026-07-02 23:30
  content: |
    今天晚上点了个外卖，送到另一个地方去了，要去拿很远，我有点烦，人的劣根性发力，想要退款且拿货（我忏悔）。但是当时申请退款的时候没想到商家会拿回去，结果就是商家没同意，然后申请店铺客服介入，骑手就把餐拿回去了。但是那个时候店铺客服还没同意退款，等于我饭财两空，我就有点难绷。一气之下开始平台客服申请退款。一开始默认弹出来的订单，是我的午饭，我没有察觉到，然后就申请了这个的，把经过跟客服说了，客服找不到骑手核实，就给我退款了。结果退款金额比晚饭钱少我倒是发现了，这才意识到不对。然后想想不能亏，人的劣根性又发力（我忏悔一点吧），又去平台申请了晚饭的退款，结果又通过了……还有前情提要是，中午由于骑手送达超时，我还获赔了 3 元，退款的时候这 3 元并没有算进去。所以我今天，在赚了 3 元的情况下，白吃了一顿午饭，唯一的代价是晚饭只能吃零食（还有就是我内心的忏悔了）。也不知道我这是幸运还是不幸。
  tags:
    - 生活小事

