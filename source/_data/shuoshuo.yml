    今天和一个很久没联系的朋友深聊了一下。她有一些很有启发的观点，在此记录一下：“无论什么时候你都有改变自己想法的权利，只要能鼓励你继续前进，我觉得就是对的。”“改变是随时的，向前是一直的。”我的朋友们总是能给我一些观点来促进我的思考，感谢他们。

    还有一件事很感慨，我和我的朋友们属于是平常不怎么联系的类型。今天翻了下聊天记录，发现很多以前说好的事都没做到，比如见一面什么的，成年人的有心无力和迫不得已越来越多，但我不希望友谊因此淡下去，更希望这让我们更珍惜这份友谊以及偶尔来之不易的如约的约定。

    btw ，比赛的队里出了点小问题，头疼。今天我妈过来，陪了她一天，虽然也因此难得好吃好喝了一天。
