    哈哈哈哈哈哈哈， this semester is over ！终于考完试了，感觉还行（要是砸了就是我感觉错了）。然后博客迎来了最新一次的更新，这次会像 pyq 一样，有评论的碎碎念就会显示评论出来，没有的则隐藏评论区。这个功能好像 giscus 原生是不支持的，实现用了一点小小的逆向，所以有想要做这个效果的朋友可以让 ai 读读我的仓库原码。这个小功能干了我一天，最后发现不行和浏览器缓存刷新机制有关，神秘了。

    今天较为颓废，明天开始要好好做和比赛有关的事了，或者有空学学 cpp 。今天甚至没锻炼，哎。
