    tzb 大学果然名不虚传，今天看报名人数居然 500 多个，而且居然能重复报名，有大约 40 个人报了两项及以上，我认识的一个佬各种挂名报了 5 个……我自己的项目创业未办而中道崩殂，还没考完试，只是在跑 baseline 就已经有一大堆问题了，不敢想后面该怎么办。头大，宁愿期末周更久一点，也不想面对那些神奇的问题。果然痛苦是比较出来的，在比赛面前期末周都显得和蔼可亲。
